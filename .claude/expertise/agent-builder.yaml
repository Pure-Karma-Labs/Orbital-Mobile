version: "1.0"
last_updated: "2026-04-07"
agent: agent-builder

core_files:
  - path: .claude/agents
    purpose: Agent markdown definitions directory
    last_hash: # populate after first commit

  - path: .claude/expertise
    purpose: Agent expertise YAML navigation maps
    last_hash: # populate after first commit

  - path: .claude/settings.json
    purpose: Agent registration with model, description, collaboration relationships
    last_hash: # populate after first commit

  - path: project-docs/SUB_AGENT_README.md
    purpose: Official Anthropic subagent specification — frontmatter, memory, hooks, permissions
    last_hash: # populate after first commit

  - path: project-docs/SKILL_BUILDER_README.md
    purpose: Official Anthropic skill specification — frontmatter, substitutions, patterns
    last_hash: # populate after first commit

documentation:
  - path: CLAUDE.md
    relevance: Project architecture context for agent domain assignments

integration_points:
  - system: Agent Ecosystem
    interface: .claude/agents/*.md + .claude/expertise/*.yaml
    purpose: Agent definitions and their navigation metadata
  - system: Settings
    interface: .claude/settings.json
    purpose: Agent registration with model, description, collaboration relationships

patterns:
  - name: two-layer-architecture
    description: Agent markdown (durable behavior) + expertise.yaml (navigation metadata)
  - name: self-maintenance
    description: Expert agents update their own expertise.yaml during normal tasks
  - name: staleness-detection
    description: Git short hashes in expertise.yaml enable agents to detect when files have changed
