unverified_types: []

known_issues:
  - camelToSnake transform will break invite endpoints that expect camelCase (issue #96)

resolved_issues:
  - Reply endpoints 500 — fixed: missing parent_reply_id column (migration 20)
  - uniffi stub bindings — fixed: real bindings regenerated via ubrn build ios
  - crypto.getRandomValues undefined — fixed: react-native-get-random-values polyfill
  - Backend rate limiter scoping — authLimiter (10 req/15min) was applied to all /api/* routes; fixed to only /api/login and /api/signup
  - Optimistic thread duplication — createNewThread now calls removeThread(clientId) + upsertThread(finalThread) instead of just updating sync status
  - Hermes Blob limitation — Hermes cannot create Blob from ArrayBuffer; media chunks must be written to temp files via react-native-fs and uploaded using file-URI FormData pattern
  - Backend completeUpload UUID validation — completeUpload endpoint requires mediaId as valid UUID; client-generated IDs must use generateUUID() not random strings
  - Rate limit 429 on chunk upload — uploadChunk retries with exponential backoff (3 attempts, 1s base); auth/validation errors (401/403) are not retried
  - Deploy source confusion — Orbital-Backend is deployed from Pure-Karma-Labs/Orbital-Backend (https://api.orbitl.org), not the desktop repo fork; always verify API contracts against this repo
  - rawResponse removal and requestBinary replacement — rawResponse option was removed from client.ts during #92 cleanup; downloadMedia now uses dedicated requestBinary() helper that returns ArrayBuffer + headers

endpoint_paths:
  note: Threads router is mounted at /api/threads in the backend
  getGroupThreads: /api/threads/groups/:groupId/threads (NOT /api/groups/:groupId/threads)
  getThread: /api/threads/:threadId
  getThreadReplies: /api/threads/:threadId/replies
  createThread: /api/threads (POST)
  createReply: /api/threads/:threadId/replies (POST, returns 201 not 200)
  getGroupQuota: /api/groups/:groupId/quota (GET, groups router not threads router)
  uploadChunk: /api/media/upload/chunk (POST, multipart FormData with snake_case keys)
  completeUpload: /api/media/upload/complete (POST, JSON body)
  downloadMedia: /api/media/:id/download (GET, returns binary with X-Encryption-IV and X-Expires-At headers)

pagination_pattern:
  type: offset
  note: Backend uses offset pagination (limit + offset query params), NOT cursor-based.

resilience_patterns:
  reply_decryption: Promise.allSettled — one undecryptable reply doesn't fail the batch
  onEndReached: Set hasMoreRef=false on error to prevent infinite 429 loop
  encrypt_decrypt: Synchronous FFI calls — async wrappers removed
  name_decryption_fallback: Show '(unable to decrypt)' not raw ciphertext on decryption failure
  optimistic_thread_finalize: removeThread(clientId) + upsertThread(finalThread) — never leave both optimistic and server threads in store
  metro_fast_refresh_db: SQLite getDb() is idempotent (returns existing handle); Metro fast-refresh re-executes module bodies but does not crash because open() on same path returns the same connection
  chunk_temp_file_cleanup: Each chunk temp file is unlinked in a finally block; cleanupOrphanedChunks() runs at bootstrap to sweep files older than 1 hour
  upload_retry: uploadChunk retries up to 3 times with exponential backoff (1s, 2s, 4s); 401/403 and cancellation short-circuit retries immediately

client_error_mapping:
  429: RATE_LIMITED (retryable)
  401: AUTH_ERROR (clears tokens)
  403: FORBIDDEN (does NOT clear tokens)

bootstrap_dependency:
  mmkv_rehydration: Must call useAppStore.persist.rehydrate() after initMMKV() in bootstrap.ts — store is created at module-import time before MMKV is initialized

quota_caller_contract:
  guard_null: activeConversationId can be null on cold start (not persisted)
  guard_dm: activeConversationId could be a DM — check conversations[id]?.type === 'group' before calling getGroupQuota

api_client_transforms:
  request: camelCase -> snake_case (automatic via camelToSnake in client.ts)
  response: snake_case -> camelCase (automatic via snakeToCamel in client.ts)
  note: Some backend endpoints return camelCase directly (UserProfile, invite fields)

polyfills:
  crypto_get_random_values: react-native-get-random-values (imported first in index.js)

dependencies:
  react_native_fs:
    package: "@dr.pogodin/react-native-fs"
    used_by: [src/services/mediaUploadService.ts]
    imports: [writeFile, unlink, readDir, CachesDirectoryPath]
    note: Required because Hermes cannot create Blob from ArrayBuffer — chunks written to temp files for FormData upload
