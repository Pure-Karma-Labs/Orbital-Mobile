documentation:
  - path: docs/MOBILE-APP-SPEC.md
    relevance: "Part 2: Crypto architecture (encryption export compliance), Part 5: Encryption schemes (privacy declarations), Part 3: Push notifications (entitlements), Part 6: Screens (HIG review)"

integration_points:
  - system: Apple App Store Connect
    interface: App metadata, screenshots, Privacy Nutrition Labels, encryption declarations
    purpose: Submission preparation — all metadata and compliance declarations live here

  - system: Signal Protocol (libsignal)
    interface: uniffi-bindgen-react-native Turbo Modules
    purpose: Encryption export compliance — X3DH, Double Ratchet, AES-GCM, Sealed Sender require ERN/CCATS determination

  - system: Apple Push Notification Service (APNs)
    interface: Push notification entitlement and capability
    purpose: Entitlements configuration — requires aps-environment entitlement and proper capability setup

  - system: Universal Links / URL Schemes
    interface: "orbital:// URL scheme and apple-app-site-association"
    purpose: Deep link compliance — orbital://invite/CODE requires CFBundleURLSchemes and associated domains

patterns:
  - name: no-third-party-tracking
    description: Orbital uses no advertising or analytics SDKs, simplifying ATT and Privacy Nutrition Label declarations

  - name: non-exempt-encryption
    description: Signal Protocol crypto (X3DH, Double Ratchet, AES-GCM, HMAC-SHA256) constitutes non-exempt encryption requiring ITSAppUsesNonExemptEncryption=YES and export compliance filing

  - name: zero-knowledge-server
    description: Server stores only ciphertext — affects Privacy Nutrition Label declarations since data is encrypted end-to-end and not accessible to the developer

  - name: minimal-permissions
    description: App requests only necessary permissions (camera for media, photo library, push notifications) — each requires a usage description string in Info.plist
