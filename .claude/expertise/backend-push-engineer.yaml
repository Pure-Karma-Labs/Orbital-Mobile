integration_points:
  - system: orbital-backend REST API
    interface: https://api.orbitl.org (35+ endpoints)
    purpose: All existing REST endpoints used by mobile clients — auth, groups, threads, replies, media, invites, Signal relay

  - system: orbital-backend WebSocket
    interface: wss://api.orbitl.org/v1/websocket
    purpose: Real-time event delivery (new_message, new_thread, new_reply) — push notifications dispatch alongside these broadcasts via signalWebSocket.js

  - system: APNs (Apple Push Notification service)
    interface: HTTP/2 API (api.push.apple.com)
    purpose: iOS push notification delivery — requires APNs auth key or certificate, device token from mobile client

  - system: FCM (Firebase Cloud Messaging)
    interface: FCM v1 API (fcm.googleapis.com)
    purpose: Android push notification delivery — requires Firebase service account, device registration token from mobile client

  - system: Desktop backend reference
    interface: alexg-g/Orbital-Desktop/orbital-backend/
    purpose: Reference implementation — schema.sql, route handlers, signalWebSocket.js, auth middleware, groupService.js

patterns:
  - name: zero-knowledge-push
    description: Push payloads contain only event type, conversation/thread IDs, and sender display name — never plaintext content. The client fetches and decrypts full content via API on app open.

  - name: dual-delivery
    description: Every real-time event is delivered via both WebSocket (for connected clients) and push notification (for backgrounded clients). The app always catches up via REST on open, making push delivery optional.

  - name: additive-backend-changes
    description: All backend modifications for mobile support are additive — new table (device_tokens), new endpoints (POST /api/devices/register, DELETE /api/devices/:tokenId), new service (pushNotificationService). No existing endpoints or behavior are modified.
