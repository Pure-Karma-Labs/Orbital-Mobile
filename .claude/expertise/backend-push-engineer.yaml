  - system: orbital-backend REST API
    interface: https://api.orbitl.org (52+ endpoints including device registration)
    purpose: All REST endpoints — auth, groups, threads, replies, media, invites, Signal relay, device registration

  - system: orbital-backend WebSocket
    interface: wss://api.orbitl.org/v1/websocket
    purpose: Real-time event delivery — push dispatch hooks fire alongside broadcastToConversation in threads.js and signal-relay.js

  - system: Firebase Cloud Messaging (unified)
    interface: firebase-admin SDK → FCM v1 API (handles both Android FCM + iOS APNs via .p8 key)
    purpose: Unified push delivery for both platforms — service account orbital-push-service@orbital-mobile-dc0cd.iam.gserviceaccount.com

patterns:
  - name: zero-knowledge-push
    description: Push payloads contain ONLY routing metadata via strict allowlist [t, gid, tid, rid, code, v] — no message content, sender names, or thread titles. filterPayload() enforces this at the function boundary.

  - name: dual-delivery-no-skip
    description: Push sent to ALL recipients regardless of WebSocket connection state — no isUserOnline() skip. Client deduplicates via Notifee foreground handler. Prevents silent notification loss from WebSocket drop race.

  - name: additive-backend-changes
    description: All backend modifications are additive — device_tokens table, /api/devices endpoints, pushService. No existing endpoints or behavior modified.

  - name: token-hygiene
    description: Stale tokens deactivated on FCM error codes (registration-token-not-registered, invalid-registration-token, invalid-argument). Upsert on (user_id, device_id) for token refresh. Soft-delete on logout (is_active=false).

  - name: android-data-only
    description: Android push uses data-only payload (no notification key) — client controls display via Notifee. setBackgroundMessageHandler in index.js renders notifications when app is killed.

  - name: fire-and-forget-dispatch
    description: Push dispatch in route handlers is always .catch(err => logger.error(...)) — never blocks the HTTP response. Recipients array reused from broadcastToConversation (no extra DB query).
