version: "2.0"
last_updated: "2026-04-08"
agent: mobile-devops-engineer

core_files:
  - path: .github/workflows/build.yml
    purpose: "Build pipeline — Android (all PRs) + iOS (main only), includes Rust cross-compilation"
  - path: .github/workflows/ci.yml
    purpose: CI pipeline — ESLint, TypeScript typecheck, Jest tests
  - path: scripts/build-ios.sh
    purpose: Convenience script — Rust build for 3 iOS targets + pod install
  - path: scripts/build-android.sh
    purpose: Convenience script — NDK auto-discovery + Rust build for 2 Android targets
  - path: rust-toolchain.toml
    purpose: Pinned Rust 1.94.1 with 5 cross-compilation targets
  - path: packages/orbital-signal/ubrn.config.yaml
    purpose: uniffi-bindgen-react-native config — Rust crate path, platform targets
  - path: android/app/build.gradle
    purpose: Android build config — signing, NDK version (27.1.12297006), SDK versions
  - path: ios/Podfile
    purpose: iOS CocoaPods config — includes orbital-signal library pod
  - path: package.json
    purpose: Root npm scripts including build:rust:ios, build:rust:android

documentation:
  - path: docs/uniffi-toolchain.md
    relevance: Cross-compilation targets, binary sizes, build times, troubleshooting
  - path: docs/MOBILE-APP-SPEC.md
    relevance: "Part 7: Implementation Phases, Part 4: Beta — distribution requirements"

integration_points:
  - system: GitHub Actions
    interface: .github/workflows/*.yml
    purpose: CI/CD pipeline — lint, test, Rust cross-compile, Android/iOS builds

  - system: Self-Hosted Runner
    interface: "macOS ARM64, labels: [self-hosted, macOS]"
    details: "Android SDK at /opt/homebrew/share/android-commandlinetools, OpenJDK 17 via Homebrew, Rust via rustup"

  - system: uniffi-bindgen-react-native (ubrn)
    version: "0.31.0-2"
    interface: "npx ubrn build ios/android --and-generate"
    purpose: Handles cargo cross-compilation + binding generation internally

  - system: cargo-ndk
    version: "4.1.2"
    interface: Android Rust cross-compilation via NDK
    purpose: Invoked by ubrn for Android targets

  - system: Apple Developer Program
    interface: Xcode signing, TestFlight
    purpose: iOS code signing and beta distribution (future)

patterns:
  - name: concurrency-groups
    description: "Workflows use concurrency groups with cancel-in-progress to avoid redundant builds"
  - name: cache-layering
    description: "4-layer caching: npm (setup-node), Rust (cargo + target, keyed on Cargo.lock + rust-toolchain.toml), Gradle, CocoaPods"
  - name: platform-conditional-builds
    description: "iOS builds on main only (expensive), Android on all PRs"
  - name: android-sdk-auto-detection
    description: "CI checks 3 common macOS SDK paths instead of hardcoding — avoids tilde expansion bug in env: blocks"
  - name: rust-before-platform-build
    description: "Rust cross-compilation runs before Gradle/xcodebuild — produces .a/.so needed by platform builds"

build_times:
  ci_lint_test: "~1.5 min"
  android_rust_cold: "~8-9 min"
  android_gradle: "~3 min"
  ios_rust_estimated: "~10 min"

known_issues:
  - issue: "NDK version hardcoded in build.yml (27.1.12297006) — must match android/build.gradle ndkVersion"
  - issue: "Self-hosted runner cache is local disk only — won't warm a second runner if scaling out"
  - issue: "Temurin JDK cask requires sudo — using Homebrew openjdk@17 formula instead"
