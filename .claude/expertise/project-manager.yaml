patterns:
  - name: phase-gated-delivery
    description: Work is organized into 4 sequential phases (Foundation, Core Features, Media & Polish, Beta) with explicit scope boundaries to prevent premature scope expansion

  - name: critical-path-tracking
    description: Identify the longest dependency chain of blocking issues within each phase milestone to surface schedule risks early

  - name: risk-driven-prioritization
    description: Known risks from PRD Part 9 (especially libsignal FFI instability rated High) drive which Phase 1 items are tackled first to retire uncertainty early
