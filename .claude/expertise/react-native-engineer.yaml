patterns:
  - name: directory-structure
    description: "Source organized by domain: src/{screens,components,navigation,stores,services,types,theme,crypto,database,utils,hooks}. Each domain directory has a .gitkeep placeholder."

  - name: strict-typescript
    description: "tsconfig uses strict mode with noImplicitAny, noUnusedLocals, noUnusedParameters, noImplicitReturns, forceConsistentCasingInFileNames"

  - name: offline-first-sync
    description: "Database schema includes pending_sync fields, sync_tasks table, and client-generated UUIDs to support offline write operations with eventual server sync"

  - name: encrypted-at-rest
    description: "All sensitive data stored in SQLCipher-encrypted database. Thread/reply content stored as encrypted BLOBs with separate IV columns. Attachment keys stored as 64-byte BLOBs."

  - name: reply-depth-coloring
    description: "Thread replies use Blue (levels 0-1) to Purple (levels 2-3) alternating depth colors with indentation capped at 24px * min(level, 4) = 96px max"

  - name: theme-system
    description: "Plain React Context + StyleSheet theme (no third-party styling lib). createTheme('light'|'dark') builds a complete Theme object. ThemeProvider wraps the app, useTheme() is the consumer hook. Font family strings must use PostScript names from the .ttf files (e.g. BitstreamVeraSans-Roman not BitstreamVeraSans)."

  - name: font-postscript-names
    description: "Bitstream Vera fonts PostScript names: body=BitstreamVeraSans-Roman, bold=BitstreamVeraSans-Bold, italic=BitstreamVeraSans-Oblique, mono=BitstreamVeraSansMono-Roman, monoBold=BitstreamVeraSansMono-Bold. These are NOT the file names."

  - name: react19-test-renderer
    description: "React 19 + react-test-renderer requires act() wrappers around create() calls when components use hooks like useColorScheme that trigger state. Pass colorSchemeOverride='light' to ThemeProvider in tests to avoid system color scheme side effects."

  - name: font-linking-native
    description: "Font files declared in react-native.config.js assets are NOT automatically linked. Must run `npx react-native-asset` to copy fonts into Xcode 'Copy Bundle Resources' and update Info.plist UIAppFonts. Font changes require native rebuild — Metro cannot hot-reload fonts."

  - name: three-font-families
    description: "Project uses three font families: BitstreamVeraSans (body, PostScript: BitstreamVeraSans-Roman), FiraSans (headers — Trebuchet MS substitute, PostScript: FiraSans-Regular for header token, FiraSans-Bold available but not used — Bold was too heavy at display sizes), BitstreamVeraSansMono (monospace, PostScript: BitstreamVeraSansMono-Roman). 7 fonts total in iOS UIAppFonts. All must be linked via npx react-native-asset and rebuilt natively."

  - name: auth-screen-layout
    description: "Auth screens compose: OrbitalLoader (animated, 64px, with spacing.lg bottom margin) -> Fira Sans title ('Orbital') -> AsciiBanner (replaces subtitle text) -> form fields -> underlined switch link at fontSize.base (not fontSize.sm). SignupScreen uses useSafeAreaInsets() for notch safety."

  - name: rn-animation-no-transform-origin
    description: "React Native has no transform-origin support. For off-center rotation (like orbiting dots), use tall invisible 'arm' views centered on the pivot point with visible elements at the ends. Animated.loop() snaps on reset — use recursive Animated.timing() with setValue() for smooth continuous rotation."

  - name: safe-area-insets-required
    description: "All screens without a React Navigation header MUST use useSafeAreaInsets() from react-native-safe-area-context for top padding. Critical for auth screens, modals, and onboarding. Never hardcode status bar height."

  - name: design-spec-first
    description: "Always read docs/design/ specs before UI work. Read order: CLAUDE-DESIGN-BRIEF.md (rules) -> MOBILE-DESIGN-FOUNDATION.md (tokens) -> MOBILE-PATTERNS.md (mobile patterns) -> per-screen spec. Code tokens must match spec exactly — verify on-device after changes."

  - name: thread-detail-layout
    description: "Correct layout for list + bottom composer + keyboard: outer View (not SafeAreaView) flex:1 -> SafeAreaView edges=['top'] wraps Header only -> KeyboardAvoidingView behavior='padding' keyboardVerticalOffset=0 flex:1 -> FlatList style={flex:1} + ReplyComposer as siblings. Do NOT wrap FlatList in extra View. Do NOT use SafeAreaView edges=['bottom'] with KAV — they fight."

  - name: flatlist-infinite-loop-guard
    description: "In onEndReached handlers, set hasMoreRef.current=false in catch blocks. Otherwise a failed API call leaves hasMore=true and onEndReached fires again immediately, creating an infinite 429 loop."

  - name: console-warn-not-error
    description: "Use console.warn (not console.error) for __DEV__ diagnostic logging. Jest --ci mode treats console.error as test failure. Also suppress React act() warnings from VirtualizedList in jest.setup.ts."

  - name: flatlist-no-remove-clipped-subviews
    description: "Avoid removeClippedSubviews on FlatLists with touch-sensitive siblings (composers, inputs). It can clip touch areas of adjacent components."

  - name: orbital-spinner-pattern
    description: "OrbitalSpinner is a compact (default 24px) version of the OrbitalLoader. Three brand-colored dots (blue, purple, yellow) positioned 120 degrees apart, rotating clockwise. Uses recursive Animated.timing (not Animated.loop) for smooth continuous rotation without snap/jump on cycle reset. Used in PullToRefreshOverlay and LoadingView."

  - name: custom-pull-to-refresh
    description: "usePullToRefresh hook + PullToRefreshOverlay component. Hook provides scrollY Animated.Value and onScroll handler using Animated.event with useNativeDriver:true. Requires Animated.FlatList (not plain FlatList) for native scroll event driver. iOS only — Android uses native RefreshControl. PullToRefreshOverlay interpolates scrollY for translate, opacity, and scale of the OrbitalSpinner."

  - name: settings-screen-architecture
    description: "Settings screen is a ScrollView composing ProfileCard (avatar + name + handle), SectionHeader helper, SettingsRow (emoji icon + label + value + chevron), and QuotaBar (progress bar with used/total label). Sub-components live in src/screens/settings/ and are memoized. Screen fetches quota from API on mount."

  - name: stack-navigator-per-tab
    description: "Each bottom tab has its own NativeStackNavigator for sub-screen push navigation. SettingsStackNavigator wraps SettingsScreen + FileLibraryScreen. ThreadsStackNavigator wraps InboxScreen + ThreadDetailScreen + OrbitSelectorScreen. This allows each tab to maintain independent navigation state."

  - name: orbit-selector-pattern
    description: "OrbitSelectorScreen is a modal screen in ThreadsStackNavigator. FlatList of group conversations filtered from store. Each OrbitListItem shows planet emoji, orbit name, member count, and checkmark for active orbit. Footer has Create Orbit and Join Orbit pressable actions. Selecting an orbit calls setActiveConversation and goBack."

  - name: theme-toggle-wiring
    description: "App.tsx reads colorScheme from useUI() store selector. Passes it as colorSchemeOverride prop to ThemeProvider. MMKV rehydration in bootstrap.ts ensures the persisted preference is loaded before first render. Settings screen cycles through system -> light -> dark via setColorScheme store action."

  - name: barrel-export-caution
    description: "Do NOT add components to src/components/index.ts if they import hooks pulling heavy service chains (download service -> store -> MMKV -> NitroModules). Causes cascading test failures in unrelated screens. Import directly instead."

  - name: media-gallery-adaptive-layout
    description: "MediaGallery uses getGalleryLayout(count, maxWidth, gap, firstItem) for 4 layout variants: 1=full-width aspect-preserved (150-300px cap, 4:3 fallback), 2=side-by-side squares, 3=L-shape (60% left + 40% right stacked), 4+=2x2 grid with dark '+N' overlay on 4th cell."

  - name: use-media-download-ref-guard
    description: "useMediaDownload effect deps must NOT include downloadState. The download service synchronously updates store to 'downloading', which triggers React cleanup (aborting the in-flight request). Use a downloadingRef to prevent self-abort. Only mediaId and shouldDownload (derived boolean) in deps."

  - name: media-lightbox-as-modal
    description: "MediaLightbox uses Modal (not navigation screen) with presentationStyle='overFullScreen'. Paging ScrollView for swipe. Close button top-right, counter top-center, prev/next arrows. StatusBar hidden when visible. Known issue: eagerly renders all pages (#127)."

  - name: media-store-selectors
    description: "useMediaForReply(replyId) and useMediaForThread(threadId) in src/stores/index.ts use useShallow for efficient re-renders. Must be added to store mocks in screen tests (e.g. ThreadDetailScreen.test.tsx)."

  - name: sql-allowlist-interpolation
    description: "mediaRepository.ts uses SORT_COLUMNS and SORT_DIRS as Record<string,string> allowlists with fallback defaults. Only allowlisted values are interpolated into SQL ORDER BY clauses; all user-supplied filter values go through parameterized ? placeholders. Apply this pattern whenever dynamic SQL ordering or column selection is needed."

  - name: download-on-tap-unbounded-list
    description: "FileLibraryCell shows blurHash/placeholder for non-downloaded items and triggers downloadAndDecryptMedia only on tap. Contrasts with MediaItemView which auto-downloads via useMediaDownload on mount. Use download-on-tap for unbounded/paginated lists (file library, search results) to avoid mass concurrent downloads. Use auto-download only for bounded lists (thread/reply inline media, typically 1-4 items)."

  - name: usewindowdimensions-responsive
    description: "Use useWindowDimensions() hook (not module-scope Dimensions.get('window')) for cell sizing and layout calculations. Module-scope Dimensions.get captures the value at import time and will not update on device rotation, multitasking split, or window resize. The hook re-renders on dimension changes."

  - name: zustand-selector-stable-ref
    description: "Zustand selectors must return stable references to avoid infinite re-render loops. Return the existing object from state (e.g., s.media) not a new object literal (e.g., {a: s.a, b: s.b}). Creating a new object on every selector call defeats shallow equality and causes useEffect deps to fire continuously. When multiple fields are needed, use useShallow with a tuple or object factory."

  - name: setmediabatch-store-first-guard
    description: "setMediaBatch, setMediaForThread, and setMediaForReply all check existing downloadState === 'downloading' and skip clobbering those entries. Required because list reloads (FileLibraryScreen loadPage, thread detail data refresh) would otherwise reset in-flight download state, causing abort/restart loops in useMediaDownload."

  - name: recover-stale-paths
    description: "recoverStalePaths(rows) async checks disk for media files that exist on disk but have stale DB state (not marked as downloaded). Updates DB + Zustand store, then returns recovered IDs so the caller can patch local component state. Used in FileLibraryScreen after loadPage to reconcile disk reality with DB."

  - name: media-mapper-extraction
    description: "mediaRowToItem and normalizeAttachmentKey extracted from threadService.ts into src/database/repositories/mediaMapper.ts. This avoids pulling the full crypto/API dependency chain when only DB-to-store data conversion is needed (e.g., in FileLibraryScreen which queries the DB directly)."
