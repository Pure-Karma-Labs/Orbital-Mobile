integration_points:
  - system: orbital-backend REST API
    interface: https://api.orbitl.org
    purpose: All data operations — auth (POST /api/login, /api/signup), groups (CRUD at /api/groups), threads (/api/threads), media (/api/media), users (/api/users), invites (/api/invites), Signal relay (/v1/messages)

  - system: orbital-backend WebSocket
    interface: wss://api.orbitl.org/v1/websocket
    purpose: Real-time events — new_message, new_thread, new_reply, display_name_changed; 30-second heartbeat with JWT auth via query param

  - system: Crypto Turbo Module
    interface: src/crypto/ (placeholder)
    purpose: Encryption/decryption boundary — this agent consumes decrypt()/encrypt() interfaces provided by the crypto specialist for thread content, reply content, and media metadata

  - system: SQLite/SQLCipher
    interface: src/database/
    purpose: Local persistent storage for offline-first support — all 17 tables defined in migration 001

  - system: React Navigation
    interface: src/navigation/ (to be created)
    purpose: App navigation architecture — tab navigator (Threads, Chats, Settings) with nested stack navigators per tab

  - system: Zustand Stores
    interface: src/stores/ (to be created)
    purpose: Global state management — typed slices for auth, conversations, threads, replies, media, and UI state

patterns:
  - name: directory-structure
    description: "Source organized by domain: src/{screens,components,navigation,stores,services,types,theme,crypto,database,utils}. Each domain directory has a .gitkeep placeholder."

  - name: strict-typescript
    description: "tsconfig uses strict mode with noImplicitAny, noUnusedLocals, noUnusedParameters, noImplicitReturns, forceConsistentCasingInFileNames"

  - name: offline-first-sync
    description: "Database schema includes pending_sync fields, sync_tasks table, and client-generated UUIDs to support offline write operations with eventual server sync"

  - name: encrypted-at-rest
    description: "All sensitive data stored in SQLCipher-encrypted database. Thread/reply content stored as encrypted BLOBs with separate IV columns. Attachment keys stored as 64-byte BLOBs."

  - name: reply-depth-coloring
    description: "Thread replies use Blue (levels 0-1) to Purple (levels 2-3) alternating depth colors with indentation capped at 24px * min(level, 4) = 96px max"
