patterns:
  - name: directory-structure
    description: "Source organized by domain: src/{screens,components,navigation,stores,services,types,theme,crypto,database,utils}. Each domain directory has a .gitkeep placeholder."

  - name: strict-typescript
    description: "tsconfig uses strict mode with noImplicitAny, noUnusedLocals, noUnusedParameters, noImplicitReturns, forceConsistentCasingInFileNames"

  - name: offline-first-sync
    description: "Database schema includes pending_sync fields, sync_tasks table, and client-generated UUIDs to support offline write operations with eventual server sync"

  - name: encrypted-at-rest
    description: "All sensitive data stored in SQLCipher-encrypted database. Thread/reply content stored as encrypted BLOBs with separate IV columns. Attachment keys stored as 64-byte BLOBs."

  - name: reply-depth-coloring
    description: "Thread replies use Blue (levels 0-1) to Purple (levels 2-3) alternating depth colors with indentation capped at 24px * min(level, 4) = 96px max"

  - name: theme-system
    description: "Plain React Context + StyleSheet theme (no third-party styling lib). createTheme('light'|'dark') builds a complete Theme object. ThemeProvider wraps the app, useTheme() is the consumer hook. Font family strings must use PostScript names from the .ttf files (e.g. BitstreamVeraSans-Roman not BitstreamVeraSans)."

  - name: font-postscript-names
    description: "Bitstream Vera fonts PostScript names: body=BitstreamVeraSans-Roman, bold=BitstreamVeraSans-Bold, italic=BitstreamVeraSans-Oblique, mono=BitstreamVeraSansMono-Roman, monoBold=BitstreamVeraSansMono-Bold. These are NOT the file names."

  - name: react19-test-renderer
    description: "React 19 + react-test-renderer requires act() wrappers around create() calls when components use hooks like useColorScheme that trigger state. Pass colorSchemeOverride='light' to ThemeProvider in tests to avoid system color scheme side effects."

  - name: font-linking-native
    description: "Font files declared in react-native.config.js assets are NOT automatically linked. Must run `npx react-native-asset` to copy fonts into Xcode 'Copy Bundle Resources' and update Info.plist UIAppFonts. Font changes require native rebuild — Metro cannot hot-reload fonts."

  - name: three-font-families
    description: "Project uses three font families: BitstreamVeraSans (body, PostScript: BitstreamVeraSans-Roman), FiraSans (headers — Trebuchet MS substitute, PostScript: FiraSans-Regular for header token, FiraSans-Bold available but not used — Bold was too heavy at display sizes), BitstreamVeraSansMono (monospace, PostScript: BitstreamVeraSansMono-Roman). 7 fonts total in iOS UIAppFonts. All must be linked via npx react-native-asset and rebuilt natively."

  - name: auth-screen-layout
    description: "Auth screens compose: OrbitalLoader (animated, 64px, with spacing.lg bottom margin) → Fira Sans title ('Orbital') → AsciiBanner (replaces subtitle text) → form fields → underlined switch link at fontSize.base (not fontSize.sm). SignupScreen uses useSafeAreaInsets() for notch safety."

  - name: rn-animation-no-transform-origin
    description: "React Native has no transform-origin support. For off-center rotation (like orbiting dots), use tall invisible 'arm' views centered on the pivot point with visible elements at the ends. Animated.loop() snaps on reset — use recursive Animated.timing() with setValue() for smooth continuous rotation."

  - name: safe-area-insets-required
    description: "All screens without a React Navigation header MUST use useSafeAreaInsets() from react-native-safe-area-context for top padding. Critical for auth screens, modals, and onboarding. Never hardcode status bar height."

  - name: design-spec-first
    description: "Always read docs/design/ specs before UI work. Read order: CLAUDE-DESIGN-BRIEF.md (rules) → MOBILE-DESIGN-FOUNDATION.md (tokens) → MOBILE-PATTERNS.md (mobile patterns) → per-screen spec. Code tokens must match spec exactly — verify on-device after changes."
