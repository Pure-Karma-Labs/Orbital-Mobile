patterns:
  - name: preloaded-store-pattern
    description: "TypeScript reads store data, passes as Input records to sync Rust functions. Rust creates InMemSignalProtocolStore, runs libsignal via block_on(), returns Result records. TypeScript persists mutations in BEGIN IMMEDIATE transaction."
  - name: build-runtime-helper
    description: "build_runtime() creates tokio::runtime::Builder::new_current_thread().enable_all().build() — used by all protocol functions"
  - name: reconstruct-identity-helper
    description: "reconstruct_identity_key_pair() and create_store() pub(crate) helpers in session.rs — all session functions use them (Issue #61 resolved)"
  - name: cargo-feature-gating
    description: "dev-roundtrip Cargo feature gates PoC roundtrip module + types — excluded from production builds (Issue #40 resolved)"
  - name: sender-key-helpers
    description: "preload_sender_key() and extract_sender_key() helpers in group.rs for consistent sender key I/O"
  - name: parse-before-decrypt
    description: "parse_prekey_message_ids() extracts pre-key IDs from PreKeySignalMessage so TypeScript knows which keys to load before calling decrypt"
  - name: library-package-structure
    description: Rust crate lives in packages/orbital-signal/ as a local RN library — avoids app naming conflicts
  - name: thin-wrapper-crate
    description: Only wraps ~18 libsignal functions, not the full API — minimizes maintenance
  - name: proc-macros-not-udl
    description: "Uses uniffi proc macros (#[uniffi::export], #[derive(uniffi::Record)]) not legacy UDL files"
  - name: bytes-across-bridge
    description: All key material crosses FFI as Vec<u8>/bytes/Uint8Array — no base64 at the bridge
  - name: pin-and-upgrade
    description: libsignal pinned to exact git tag v0.83.0 — upgrade only with deliberate review
  - name: release-profile-optimized
    description: "[profile.release] with lto=thin, codegen-units=1, strip=symbols for smaller binaries"

blockers:
  - name: uniffi-ffi-converter-arc
    description: "RESOLVED — uniffi 0.31.0 cannot pass Arc<dyn CallbackInterface> through any exported function. Preloaded store pattern is the permanent workaround."
    resolution: "Issue #58 spike confirmed. All protocol functions use Input/Result records instead of callback interfaces."
  - name: sealed-sender-deferred
    description: "sealed.rs stubs remain — requires server-side SenderCertificate issuance endpoint"
    resolution: "Tracked as Issue #64. Implement when backend adds certificate API."

