patterns:
  - name: library-package-structure
    description: Rust crate lives in packages/orbital-signal/ as a local RN library — avoids app naming conflicts
  - name: thin-wrapper-crate
    description: Only wraps ~18 libsignal functions, not the full API — minimizes maintenance
  - name: proc-macros-not-udl
    description: Uses uniffi proc macros (#[uniffi::export], #[derive(uniffi::Record)]) not legacy UDL files
  - name: bytes-across-bridge
    description: All key material crosses FFI as Vec<u8>/bytes/Uint8Array — no base64 at the bridge
  - name: pin-and-upgrade
    description: libsignal pinned to exact git tag v0.83.0 — upgrade only with deliberate review
  - name: release-profile-optimized
    description: "[profile.release] with lto=thin, codegen-units=1, strip=symbols for smaller binaries"

blockers:
  - name: uniffi-ffi-converter-arc
    description: "uniffi 0.31.0 cannot pass Arc<dyn CallbackInterface> through Object constructors or async function params"
    resolution: "Upgrade uniffi when fixed, or implement native-side client (Swift/Kotlin) holding stores"
  - name: libsignal-async-trait-not-send
    description: "libsignal store traits use #[async_trait(?Send)] producing non-Send futures, incompatible with uniffi async"
    resolution: "Wrap in Send-safe adapters or use synchronous bridging on native side"
