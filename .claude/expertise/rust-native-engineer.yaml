    interface: Generated TypeScript Turbo Module bindings
    purpose: Auto-generates Swift, Kotlin, and TypeScript bindings from UniFFI-annotated Rust code

  - system: libsignal v0.83.0
    interface: Rust crate dependency
    purpose: Core crypto library being wrapped — pinned version, no stable public FFI API

  - system: iOS Build System
    interface: Podspec + .xcframework
    purpose: Integration of compiled Rust .a into Xcode via CocoaPods

  - system: Android Build System
    interface: Gradle + .so libraries
