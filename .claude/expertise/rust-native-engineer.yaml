  - system: CI Pipeline
    interface: .github/workflows/build.yml
    purpose: Cross-compilation must run in CI on the self-hosted macOS ARM64 runner

patterns:
  - name: thin-wrapper-crate
    description: Rust crate wraps only the ~15-20 libsignal functions needed, not the full API — minimizes maintenance burden

  - name: five-target-compilation
    description: "Cross-compile for 5 targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim, aarch64-linux-android, x86_64-linux-android"

  - name: pin-and-upgrade
    description: Pin libsignal to v0.83.0 via exact version in Cargo.toml — upgrade only with deliberate review and testing
