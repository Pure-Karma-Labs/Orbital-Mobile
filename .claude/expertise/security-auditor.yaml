integration_points:
  - system: Signal Protocol (libsignal)
    interface: uniffi-bindgen-react-native Turbo Modules (preloaded store pattern)
    purpose: Crypto boundary — key handling across FFI boundary; preloaded store means keys transit JS heap; PoC functions gated behind dev-roundtrip feature flag (PR #84)
  - system: orbital-backend API
    interface: REST + WebSocket via src/services/api/
    purpose: Network layer — HTTPS enforced, cert pinning deferred to Phase 2
  - system: SQLCipher
    interface: Encrypted SQLite via src/database/connection.ts
    purpose: Local storage — raw-key hex, WAL mode, cipher_memory_security ON
  - system: iOS Keychain / Android Keystore
    interface: Platform secure storage via src/services/secure-storage/
    purpose: Secure enclave for MMKV key, JWT tokens, identity key pair (PR #83 — F-01 resolved)
  - system: Media attachment crypto (Rust FFI)
    interface: uniffi attachment_encrypt/attachment_decrypt via attachmentCrypto.ts
    purpose: Attachment encryption boundary — 64-byte keys, HMAC-before-decrypt, opaque errors; keys stay in memory/SQLCipher, never sent to server
  - system: Media download pipeline
    interface: mediaDownloadService.ts — download → decrypt → atomic write to disk
    purpose: Decrypted media persistence — path-injection-validated, atomic writes, inflight dedup, semaphore-limited concurrency

patterns:
  - name: begin-immediate-transactions
    description: All crypto/Signal Protocol transactions use BEGIN IMMEDIATE, never BEGIN TRANSACTION — prevents TOCTOU races in preloaded store pattern
  - name: per-address-serialization
    description: Protocol operations serialized per recipient address — prevents concurrent Double Ratchet corruption
  - name: no-privkey-in-ffi-results
    description: Private key material never appears in FFI function return types — only public keys cross Rust/TS boundary in results
  - name: no-console-in-crypto
    description: Zero console.log/warn/error in src/services/crypto/ — prevents key material leaking to system logs
  - name: prekey-consumption-atomicity
    description: Session save + identity check + pre-key deletion in single BEGIN IMMEDIATE transaction — preserves forward secrecy
  - name: blob-for-keys
    description: All crypto key material stored as BLOB (Uint8Array) in SQLCipher, never hex/base64 TEXT
  - name: zero-knowledge-server
    description: Server stores only ciphertext — plaintext never leaves client
  - name: per-field-iv
    description: Each encrypted field has its own IV column, preventing IV reuse
  - name: encrypt-then-mac
    description: Media uses AES-256-CBC with HMAC-SHA256 — verify MAC before decryption
  - name: dev-only-debug-info
    description: serverMessage and verbose errors only when __DEV__ is true
  - name: bootstrap-before-render
    description: index.js bootstrap() runs before AppRegistry.registerComponent — DB/MMKV ready before any component
  - name: identity-key-in-keychain
    description: Identity key pair stored in iOS Keychain / Android Keystore with AFTER_FIRST_UNLOCK_THIS_DEVICE_ONLY; cache-on-load pattern; cache cleared on logout
  - name: feature-gated-poc
    description: PoC/demo functions in Rust crate gated behind dev-roundtrip Cargo feature flag; default features empty so release builds exclude them
  - name: hmac-before-decrypt
    description: Attachment decryption verifies HMAC-SHA256 before CBC decryption — prevents padding oracle attacks; implemented in attachment_crypto.rs
  - name: opaque-decryption-errors
    description: MAC failure, digest mismatch, and unpad failure all return the same SignalError::InvalidMessage variant — prevents error-based information leakage
  - name: plaintext-hash-never-sent
    description: plaintextHash (SHA-256 of original file) is local-only integrity check — sending it to the server would break zero-knowledge guarantees
  - name: ciphertext-temp-files-cleanup
    description: Encrypted chunk temp files in CachesDirectoryPath cleaned up in finally blocks and via startup orphan sweep (cleanupOrphanedChunks); inherits NSFileProtectionCompleteUntilFirstUserAuthentication from app entitlements
  - name: db-guard-for-hot-reload
    description: All DB-touching service code must check isDatabaseInitialized() before DB calls — Metro Fast Refresh resets the db singleton in connection.ts; applies to mediaDownloadService, mediaUploadService, threadService (processMediaMetadata), and any future service that calls DB repositories
  - name: path-injection-validation
    description: Server-controlled values (mediaId, file extension) validated against strict regex (SAFE_ID_RE for UUID, SAFE_EXT_RE for alphanumeric) before file path construction — prevents directory traversal; reference implementation in mediaDownloadService.ts:86-97
  - name: atomic-plaintext-write
    description: Decrypted media written to .tmp path then moveFile() to final path — prevents partial plaintext files on crash/kill; applied in mediaDownloadService.ts; same temp-file pattern used in upload service for ciphertext chunks
  - name: preserve-upload-keys-on-merge
    description: processMediaMetadata checks in-memory store before DB before creating new entries — prevents server responses from overwriting upload-side hasKeys/localPath/attachment_key; loss of attachment keys = permanent data loss
