patterns:
  - name: blob-for-keys
    description: All crypto key material stored as BLOB (Uint8Array) in SQLCipher, never as hex/base64 TEXT

  - name: zero-knowledge-server
    description: Server stores only ciphertext — encrypted_title, encrypted_body, encrypted_envelope — plaintext never leaves client

  - name: per-field-iv
    description: Each encrypted field has its own IV column, preventing IV reuse across fields encrypted with the same group key

  - name: encrypt-then-mac
    description: Media uses AES-256-CBC with HMAC-SHA256 — verify MAC is checked before decryption
