patterns:
  - name: blob-for-keys
    description: All key material stored as BLOB in SQLCipher, never as hex/base64 TEXT
  - name: proc-macros-not-udl
    description: Uses uniffi proc macros for all type/function exports — not legacy UDL
  - name: serialized-bytes-boundary
    description: "libsignal types serialize to Vec<u8> at the FFI boundary — stores handle raw bytes"
  - name: callback-interface-stores
    description: "6 store traits defined as #[uniffi::export(callback_interface)] — foreign side implements"
  - name: device-id-clamping
    description: "DeviceId is NonZeroU8 (1-127) — u32 from TypeScript must be clamped before conversion"
  - name: group-key-encryption
    description: Thread/reply content encrypted with AES-GCM using the group key
  - name: attachment-key-separation
    description: Media uses separate 64-byte attachment keys (AES-256 + HMAC)

blockers:
