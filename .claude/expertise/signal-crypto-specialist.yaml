patterns:
  - name: blob-for-keys
    description: All cryptographic key material stored as BLOB (Uint8Array) in SQLCipher, never as hex/base64 TEXT

  - name: per-field-iv
    description: Each encrypted field (title, body) has its own IV column, preventing IV reuse across fields

  - name: group-key-encryption
    description: Thread/reply content encrypted with AES-GCM using the group key; each member receives an encrypted copy of the group key

  - name: attachment-key-separation
    description: Media uses separate 64-byte attachment keys (AES-256 + HMAC), stored only in SQLCipher, never sent to server
