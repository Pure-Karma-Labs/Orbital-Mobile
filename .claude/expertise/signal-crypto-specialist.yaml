patterns:
  - name: preloaded-store
    description: "TypeScript reads store data → passes Input records to Rust → Rust uses InMemSignalProtocolStore + block_on() → returns Result records → TypeScript persists mutations"
  - name: per-address-locking
    description: "Module-scoped promise-queue per {name}:{deviceId} serializes all protocol operations to same address"
  - name: begin-immediate-transactions
    description: "All store mutations wrapped in BEGIN IMMEDIATE ... COMMIT for write-lock atomicity"
  - name: auto-session-establishment
    description: "encrypt() auto-calls private establishSession() if no session exists — fetches bundle from server"
  - name: parse-before-decrypt
    description: "parsePreKeyMessageIds() extracts pre-key IDs before calling signalDecryptPreKey — TypeScript knows which keys to load"
  - name: blob-for-keys
    description: All key material stored as BLOB in SQLCipher, never as hex/base64 TEXT (except identity key in items — Issue #54)
  - name: serialized-bytes-boundary
    description: "libsignal types serialize to Vec<u8>/ArrayBuffer at the FFI boundary — stores handle raw bytes"
  - name: device-id-clamping
    description: "DeviceId is NonZeroU8 (1-127) — u32 from TypeScript must be clamped before conversion"

blockers:
  - name: identity-key-keychain-migration
    description: "Identity private key in SQLCipher items table must move to Keychain/Keystore (Critical, Issue #54)"
    resolution: "Must fix before beta release"
  - name: sealed-sender-certificates
    description: "Sealed sender requires SenderCertificate from orbital-backend — not yet available"
    resolution: "Tracked as Issue #64. Implement when backend adds certificate endpoint."
  - name: dead-code-cleanup
    description: "stores.rs, store_adapters.rs adapter structs, client.rs are dead code from callback path"
    resolution: "Tracked as Issue #63. Remove after confirming no references."
