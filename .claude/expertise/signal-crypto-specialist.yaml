    description: "10 functions stubbed — need store adapters passing through uniffi boundary"
    resolution: "uniffi upgrade for FfiConverterArc, or native-side client pattern"
  - name: sealed-sender-certificates
    description: "Sealed sender requires SenderCertificate from orbital-backend — not yet available"
    resolution: "Implement after backend certificate endpoint is ready"
