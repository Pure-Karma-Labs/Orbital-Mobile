integration_points:
  - system: React Native Application Layer
    interface: src/screens/, src/components/, src/navigation/
    purpose: UI layer — monitor for data access logic leaking into components, re-render risks, state coupling

  - system: State Management
    interface: src/stores/
    purpose: State stores — monitor for unnecessary re-renders, stale closures, subscription leaks

  - system: Service Layer
    interface: src/services/api/, src/services/crypto/, src/services/websocket/
    purpose: Business logic services — monitor for layer boundary violations, crypto escaping its module

  - system: Database Layer
    interface: src/database/
    purpose: Data access — monitor for N+1 patterns, query efficiency, schema-type drift

  - system: Crypto Module
    interface: src/crypto/, packages/orbital-signal/
    purpose: uniffi bindings and Signal Protocol — monitor for crypto logic leaking into other layers, sync-on-JS-thread bottlenecks

  - system: CI Pipeline
    interface: .github/workflows/
    purpose: Build and test — monitor for test coverage trends, build time regressions

patterns:
  - name: agentic-bloat-vectors
    description: AI-generated code characteristic failure modes — duplication across files, no-op wrapper functions that delegate without transforming, premature abstraction creating layers before complexity warrants them

  - name: normalized-data-convention
    description: "Project convention: normalized columns, no JSON blobs (except items table KV store), BLOB for all key material. Violations indicate schema drift."

  - name: strict-typescript-baseline
    description: "tsconfig strict settings (noUnusedLocals, noUnusedParameters, noImplicitReturns) serve as code quality floor — any relaxation is a debt item"

  - name: contextual-architecture-review
    description: Evaluate layer boundaries based on actual code conventions, not prescribed patterns. Discover what the codebase has established and enforce consistency.

  - name: layer-boundary-awareness
    description: "App natural layers: screens/components (UI) -> stores (state) -> services (api/crypto/websocket) -> database -> crypto module (uniffi). Outer layers must not depend on inner layer implementation details."
