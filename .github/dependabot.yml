version: 2

updates:
  # npm dependencies (root package.json)
  # Grouped to avoid flooding the PR queue: React Native's dependency graph is
  # very active and ungrouped weekly updates would produce 10+ PRs per week.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
    ignore:
      # React Native upgrades are deliberate projects (native template changes,
      # codegen, library compat), not dependency bumps — tracked in issue #311.
      # RN minors are de facto majors; patches still flow. The grouped RN-family
      # bumps also produce broken lockfiles (missing @react-native/metro-* entries).
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@react-native/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@react-native-community/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react-test-renderer"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # react 19.1.x patches break react-test-renderer — pinned at 19.1.1
      # until upstream fix lands (see project_react19_compat.md)
      - dependency-name: "react"
        versions: [">= 19.1.2", "< 19.2.0"]
      - dependency-name: "react-test-renderer"
        versions: [">= 19.1.2", "< 19.2.0"]
      # Babel 8 and ESLint 10 require RN ecosystem support — tracked in #311
      - dependency-name: "@babel/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@babel/preset-env"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # jest majors ride along with RN preset support (see closed #306)
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]

  # Rust/Cargo dependencies (orbital_signal crate)
  # Note: the libsignal git dependency is NOT covered by Dependabot or
  # cargo-audit -- the weekly libsignal-check job in security.yml tracks it.
  - package-ecosystem: cargo
    directory: /packages/orbital-signal/rust/orbital_signal
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # libsignal-protocol and libsignal-core come from the same monorepo
      # (signalapp/libsignal) and must share the same git tag. Ungrouped
      # bumps produce split PRs that fail Rust compilation because two tag
      # versions of libsignal-core end up in one dependency graph. See the
      # lockstep comment in Cargo.toml and closed PRs #465/#467.
      libsignal:
        patterns:
          - "libsignal-*"
    ignore:
      # rand 0.10 requires trait renames incompatible with libsignal's
      # rand 0.9 bounds — defer until libsignal supports it (see #399)
      - dependency-name: "rand"
        versions: [">= 0.10.0"]
      # uniffi 0.32+ reworked the bindgen pipeline API and metadata format.
      # Our binding generator (uniffi-bindgen-react-native) hard-pins
      # uniffi = "=0.31.0" and cannot parse 0.32 metadata — Android builds
      # fail with "invalid utf-8 sequence" extracting UNIFFI_META symbols
      # (see closed PR #466). No ubrn release supporting 0.32 exists yet;
      # re-evaluate when jhugman/uniffi-bindgen-react-native ships one.
      - dependency-name: "uniffi"
        versions: [">= 0.32.0"]

  # GitHub Actions (workflow files)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
