name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android Debug Build
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Android SDK
        run: |
          # Check common Android SDK locations on macOS
          for sdk_path in "$HOME/Library/Android/sdk" "/opt/homebrew/share/android-commandlinetools" "/usr/local/share/android-commandlinetools"; do
            if [ -d "$sdk_path" ]; then
              echo "ANDROID_HOME=$sdk_path" >> "$GITHUB_ENV"
              echo "ANDROID_SDK_ROOT=$sdk_path" >> "$GITHUB_ENV"
              echo "Found Android SDK at $sdk_path"
              ls "$sdk_path/platforms/" 2>/dev/null || echo "No platforms installed"
              exit 0
            fi
          done
          echo "::error::Android SDK not found. Install Android Studio or set ANDROID_HOME on the runner."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  build-ios:
    name: iOS Debug Build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS Debug
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/OrbitalMobile.xcworkspace \
            -scheme OrbitalMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | tail -50
