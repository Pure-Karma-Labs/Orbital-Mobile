name: Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/orbital-signal/**'
      - 'android/**'
      - 'ios/**'
      - 'src/config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'packages/orbital-signal/**'
      - 'android/**'
      - 'ios/**'
      - 'src/config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'
  # workflow_dispatch lets us manually trigger build jobs on this branch to
  # verify the hosted-runner migration before it merges to main.
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android Debug Build
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The hosted macOS runner (macos-latest = macos-26) ships NDK 27.3 as
      # its default, but android/build.gradle pins ndkVersion to 27.1.12297006
      # (the version used during initial development). Install the exact minor
      # version so both the Gradle AGP resolution and the ANDROID_NDK_HOME env
      # for cargo-ndk point to the same directory. NDK downloads are cached
      # so only the first cold run incurs the ~1 GB download.
      # Note: ANDROID_HOME is pre-set by the hosted runner image.
      - name: Cache Android NDK 27.1.12297006
        id: ndk-cache
        uses: actions/cache@v6
        with:
          path: ~/Library/Android/sdk/ndk/27.1.12297006
          key: android-ndk-27.1.12297006-${{ runner.os }}

      - name: Install Android NDK 27.1.12297006
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.1.12297006"

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> "$GITHUB_ENV"

      # GitHub-hosted runners have Rust pre-installed (currently 1.96.0) but
      # rust-toolchain.toml pins 1.94.1. rustup reads rust-toolchain.toml on
      # first cargo invocation and auto-downloads the pinned toolchain. The
      # explicit target additions below mirror the toml entries and ensure
      # targets are available before the first cargo run in the workspace.
      - name: Setup Rust
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk@4.1.2 --locked 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      # Issue #510: on main, this step's `Post` phase uploads the (already
      # rust-cache-pruned) target/ dir, which took 13+ min per push even on
      # merges that didn't touch the crate (~half of them). A cheap
      # lookup-only pass first checks whether an exact-match cache entry
      # already exists for this key (Cargo.lock/rust-toolchain.toml hash +
      # the rust-build-android shared-key) without downloading anything; the
      # real restore step below skips its save when that lookup hits.
      - name: Rust cache lookup (android)
        id: rust-cache-lookup-android
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          shared-key: rust-build-android
          lookup-only: true

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          # Does not encode Rust profile — split key if a release build step is ever added.
          shared-key: rust-build-android
          # save-if can't reference this same step's own cache-hit output
          # (with: inputs are evaluated before the step runs), hence the
          # separate lookup-only step above. PR restore-only behavior (#310)
          # is unchanged: save-if is false on PRs regardless of the lookup.
          save-if: ${{ github.ref == 'refs/heads/main' && steps.rust-cache-lookup-android.outputs.cache-hit != 'true' }}

      - name: Build Rust for Android
        run: |
          cd packages/orbital-signal
          npm run build:android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Gradle dependency cache: caches downloaded JARs (~300 MB typical for
      # this project) so they are not re-downloaded on every cold hosted-runner
      # boot. The full build-output cache (~6 GB with all intermediate
      # compiled artifacts) is still omitted — that volume causes 0 MB/s stalls
      # when uploading to GitHub's cache service.
      - name: Cache Gradle dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'

  build-ios:
    name: iOS Debug Build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # macos-latest (macos-26) defaults to Xcode 26.5. Pinning explicitly
      # makes the version visible in CI logs and prevents silent drift when the
      # runner image ships a new default. The Podfile post_install hook patches
      # fmt/base.h to disable a false-positive consteval error introduced in
      # Xcode 26's Apple Clang build (see ios/Podfile); the patch targets all
      # Apple Clang versions and is forward-compatible within the 26.x series.
      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      # GitHub-hosted runners have Rust pre-installed (currently 1.96.0) but
      # rust-toolchain.toml pins 1.94.1. rustup reads rust-toolchain.toml on
      # first cargo invocation and auto-downloads the pinned toolchain. The
      # explicit target additions below mirror the toml entries and ensure
      # targets are available before the first cargo run in the workspace.
      - name: Setup Rust
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: Inject GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/OrbitalMobile/GoogleService-Info.plist

      # Issue #510: see the matching comment in build-android above. Same
      # lookup-only-then-restore pattern, keyed on the ios shared-key so the
      # android/ios caches never clobber each other.
      - name: Rust cache lookup (ios)
        id: rust-cache-lookup-ios
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          shared-key: rust-build-ios
          lookup-only: true

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          # Does not encode Rust profile — split key if a release build step is ever added.
          shared-key: rust-build-ios
          save-if: ${{ github.ref == 'refs/heads/main' && steps.rust-cache-lookup-ios.outputs.cache-hit != 'true' }}

      - name: Build Rust for iOS
        run: |
          cd packages/orbital-signal
          npm run build:ios

      - name: Cache CocoaPods
        uses: actions/cache@v6
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Detect iOS Simulator
        id: simulator
        run: |
          # Pick the first available iPhone simulator
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
              for d in devices:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['name']); sys.exit()
          print('iPhone 17 Pro')  # fallback
          ")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Build iOS Debug
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/OrbitalMobile.xcworkspace \
            -scheme OrbitalMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | tail -50
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
