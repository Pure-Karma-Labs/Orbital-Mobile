name: Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/orbital-signal/**'
      - 'android/**'
      - 'ios/**'
      - 'src/config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'packages/orbital-signal/**'
      - 'android/**'
      - 'ios/**'
      - 'src/config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/build.yml'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android Debug Build
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Android SDK
        run: |
          for sdk_path in "$HOME/Library/Android/sdk" "/opt/homebrew/share/android-commandlinetools" "/usr/local/share/android-commandlinetools"; do
            if [ -d "$sdk_path" ]; then
              echo "ANDROID_HOME=$sdk_path" >> "$GITHUB_ENV"
              echo "ANDROID_SDK_ROOT=$sdk_path" >> "$GITHUB_ENV"
              echo "Found Android SDK at $sdk_path"
              exit 0
            fi
          done
          echo "::error::Android SDK not found. Install Android Studio or set ANDROID_HOME on the runner."
          exit 1

      - name: Setup Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk@4.1.2 --locked 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          shared-key: rust-build-android
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build Rust for Android
        run: |
          cd packages/orbital-signal
          npm run build:android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  build-ios:
    name: iOS Debug Build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: Inject GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/OrbitalMobile/GoogleService-Info.plist

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/orbital-signal/rust/orbital_signal
          shared-key: rust-build-ios
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build Rust for iOS
        run: |
          cd packages/orbital-signal
          npm run build:ios

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Detect iOS Simulator
        id: simulator
        run: |
          # Pick the first available iPhone simulator
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
              for d in devices:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['name']); sys.exit()
          print('iPhone 17 Pro')  # fallback
          ")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Build iOS Debug
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/OrbitalMobile.xcworkspace \
            -scheme OrbitalMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | tail -50
