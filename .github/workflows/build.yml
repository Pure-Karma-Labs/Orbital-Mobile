name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Android Debug Build
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Android SDK
        run: |
          for sdk_path in "$HOME/Library/Android/sdk" "/opt/homebrew/share/android-commandlinetools" "/usr/local/share/android-commandlinetools"; do
            if [ -d "$sdk_path" ]; then
              echo "ANDROID_HOME=$sdk_path" >> "$GITHUB_ENV"
              echo "ANDROID_SDK_ROOT=$sdk_path" >> "$GITHUB_ENV"
              echo "Found Android SDK at $sdk_path"
              exit 0
            fi
          done
          echo "::error::Android SDK not found. Install Android Studio or set ANDROID_HOME on the runner."
          exit 1

      - name: Setup Rust
        run: |
          if ! command -v cargo &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk@3.5.7
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/orbital-signal/rust/orbital_signal/target
          key: rust-android-${{ hashFiles('packages/orbital-signal/rust/orbital_signal/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            rust-android-

      - name: Build Rust for Android
        run: |
          cd packages/orbital-signal
          npm run build:android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  build-ios:
    name: iOS Debug Build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          if ! command -v cargo &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/orbital-signal/rust/orbital_signal/target
          key: rust-ios-${{ hashFiles('packages/orbital-signal/rust/orbital_signal/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            rust-ios-

      - name: Build Rust for iOS
        run: |
          cd packages/orbital-signal
          npm run build:ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS Debug
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/OrbitalMobile.xcworkspace \
            -scheme OrbitalMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log | tail -50
