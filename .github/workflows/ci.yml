name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # dorny/paths-filter queries the PR changed-files API on pull_request events
  pull-requests: read

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Jest tests
        run: npm test -- --ci --coverage

      # ---------------------------------------------------------------------
      # Issue #598: catch emoji asset regeneration drift.
      #
      # generate:emoji is pure Node + sharp (a devDependency already installed
      # by npm ci above). It reads emoji-datasource and openmoji SVGs, then
      # writes assets/emoji/*.webp and src/emoji/assetMap.ts.
      #
      # We intentionally do NOT diff the binary .webp contents: sharp/libvips
      # re-encodes SVGs to WebP and the exact byte sequence varies across
      # libvips versions pinned in different runner images. Diffing binary
      # output would produce false positives (runner image update => CI red)
      # without catching any real drift. The meaningful drift classes are:
      #   (a) the codegen'd TypeScript map changes (wrong keys, wrong paths)
      #   (b) a different number of assets is produced (missing/extra emoji)
      # Both are caught without touching binary content.
      # Gated to changes that can actually cause drift (generator, emoji
      # data/map, deps, or the assets themselves) so unrelated PRs don't pay
      # the ~1min sharp rasterization cost. Mirrors the pod-filter pattern
      # below. Push builds on main always run it (event gate on the filter).
      - name: Emoji drift filter
        id: emoji-filter
        if: github.event_name == 'pull_request'
        # SHA-pinned: 7b450fff21473bca461d4b92ce414b9d0420d706 = v4.0.2
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            emoji:
              - 'scripts/generate-emoji-assets.mjs'
              - 'src/emoji/**'
              - 'assets/emoji/**'
              - 'package.json'
              - 'package-lock.json'

      - name: Emoji asset drift check
        if: github.event_name != 'pull_request' || steps.emoji-filter.outputs.emoji == 'true'
        run: |
          npm run generate:emoji
          # (a) Map text must be unchanged — catches codegen/key-naming drift
          git diff --exit-code src/emoji/assetMap.ts
          # (b) Asset file count must match map entry count — catches
          #     missing/extra emoji without diffing binary WebP content.
          EXPECTED=$(grep -c "require(" src/emoji/assetMap.ts)
          ACTUAL=$(ls assets/emoji/*.webp 2>/dev/null | wc -l | tr -d ' ')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: asset count mismatch — assetMap.ts has $EXPECTED entries, assets/emoji/ has $ACTUAL files"
            exit 1
          fi

      # ---------------------------------------------------------------------
      # Issue #513: catch native-dependency lockfile drift on PRs.
      #
      # build.yml's iOS Debug Build (which runs a real `pod install`) is
      # gated to main-only pushes because it's expensive. That left a gap:
      # PRs bumping a native module (e.g. #505, where @sentry/react-native
      # 8.17.2's RNSentry.podspec pinned an exact Sentry version that
      # conflicted with the committed ios/Podfile.lock) could merge to main
      # and only fail there. CocoaPods reported that conflict as a
      # deployment-target error, not a version-pin error, making it doubly
      # confusing post-merge.
      #
      # A text diff of Podfile.lock can't catch this class of bug -- the
      # conflict comes from evaluating third-party podspecs (which can
      # pin/require versions independent of what's committed), not from the
      # lockfile alone. `pod install --deployment` is the real dependency
      # resolver in read-only/verify mode: it fails without mutating
      # Podfile.lock if the Podfile/podspecs and the committed lockfile
      # disagree. (`pod check` does not exist in modern CocoaPods.)
      #
      # Gated to PRs that touch package.json or ios/** so it doesn't run on
      # every PR -- pod resolution isn't affected by anything else in the
      # repo.
      - name: Podfile.lock consistency filter
        id: pod-filter
        if: github.event_name == 'pull_request'
        # SHA-pinned: 7b450fff21473bca461d4b92ce414b9d0420d706 = v4.0.2
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            ios-native:
              - 'package.json'
              - 'ios/**'
              - 'packages/orbital-signal/*.podspec'

      - name: Cache CocoaPods
        if: github.event_name == 'pull_request' && steps.pod-filter.outputs.ios-native == 'true'
        uses: actions/cache@v6
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            pods-${{ runner.os }}-

      # `pod install` evaluates the Podfile and every dependency's podspec as
      # arbitrary Ruby. On GitHub-hosted ephemeral runners this is safe --
      # the VM is discarded after the job, so fork PRs cannot exfiltrate
      # secrets or persist changes to the host machine. (Issue #479 migrated
      # this job to GitHub-hosted runners specifically to close that attack
      # surface before the repo goes public.)
      - name: Podfile.lock consistency check
        if: github.event_name == 'pull_request' && steps.pod-filter.outputs.ios-native == 'true'
        working-directory: ios
        run: pod install --deployment
