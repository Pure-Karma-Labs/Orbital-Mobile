<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orbital · Color · Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-background); }
  .wrap { padding: 20px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { flex: 1; min-width: 0; border: 1px solid var(--color-border-subtle); border-radius: 3px; overflow: hidden; background: var(--color-surface-elevated); }
  .fill { height: 64px; }
  .meta { padding: 8px 10px; font-family: var(--font-body); font-size: 11px; line-height: 1.35; }
  .name { font-weight: 700; color: var(--color-text-primary); font-size: 12px; }
  .hex  { font-family: var(--font-mono); color: var(--color-text-secondary); font-size: 11px; letter-spacing: 0.1px; }
  .role { color: var(--color-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="swatch">
      <div class="fill" style="background:#5B9FED"></div>
      <div class="meta"><div class="name">colors.blue</div><div class="hex">#5B9FED</div><div class="role">Primary buttons · L1/L3 replies · links · active</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:#4A8CD9"></div>
      <div class="meta"><div class="name">blueHover</div><div class="hex">#4A8CD9</div><div class="role">Pressed / hover</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:#3D7BC4"></div>
      <div class="meta"><div class="name">blueDark</div><div class="hex">#3D7BC4</div><div class="role">Borders, emphasis</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:rgba(91,159,237,0.08); background-image: linear-gradient(45deg, var(--color-border-subtle) 25%, transparent 25%), linear-gradient(-45deg, var(--color-border-subtle) 25%, transparent 25%); background-size: 8px 8px;">
        <div style="background:rgba(91,159,237,0.08); height:100%"></div>
      </div>
      <div class="meta"><div class="name">blueTintLight</div><div class="hex">rgba(91,159,237, .08)</div><div class="role">L1 reply background</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background-image: linear-gradient(45deg, var(--color-border-subtle) 25%, transparent 25%), linear-gradient(-45deg, var(--color-border-subtle) 25%, transparent 25%); background-size: 8px 8px;">
        <div style="background:rgba(91,159,237,0.12); height:100%"></div>
      </div>
      <div class="meta"><div class="name">blueTint</div><div class="hex">rgba(91,159,237, .12)</div><div class="role">L3 reply background</div></div>
    </div>
  </div>
</div>
</body>
</html>
