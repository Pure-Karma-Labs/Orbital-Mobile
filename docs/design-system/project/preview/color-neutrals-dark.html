<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Neutrals (Dark)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#1A1D24}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border:1px solid #374151;border-radius:3px;overflow:hidden;background:#2D3139}
  .fill{height:48px;border-bottom:1px solid #374151}
  .meta{padding:7px 9px;font-family:var(--font-body);font-size:11px;line-height:1.35}
  .name{font-weight:700;color:#F3F4F6;font-size:11px}
  .hex{font-family:var(--font-mono);color:#C7CCD4;font-size:10px;letter-spacing:0.1px}
  .role{color:#9CA3AF;font-size:10px;margin-top:1px}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="fill" style="background:#1A1D24"></div><div class="meta"><div class="name">background</div><div class="hex">#1A1D24</div><div class="role">Midnight Canvas</div></div></div>
  <div class="sw"><div class="fill" style="background:#24272F"></div><div class="meta"><div class="name">surface</div><div class="hex">#24272F</div><div class="role">Charcoal Panel</div></div></div>
  <div class="sw"><div class="fill" style="background:#2D3139"></div><div class="meta"><div class="name">surfaceElevated</div><div class="hex">#2D3139</div><div class="role">Slate Panel</div></div></div>
  <div class="sw"><div class="fill" style="background:#F3F4F6"></div><div class="meta"><div class="name">textPrimary</div><div class="hex">#F3F4F6</div><div class="role">Pearl White</div></div></div>
  <div class="sw"><div class="fill" style="background:#6BA8F0"></div><div class="meta"><div class="name">blue (dark)</div><div class="hex">#6BA8F0</div><div class="role">Lightened</div></div></div>
  <div class="sw"><div class="fill" style="background:#A895F8"></div><div class="meta"><div class="name">purple (dark)</div><div class="hex">#A895F8</div><div class="role">Lightened</div></div></div>
  <div class="sw"><div class="fill" style="background:#374151"></div><div class="meta"><div class="name">borderSubtle</div><div class="hex">#374151</div><div class="role">Shadow Gray</div></div></div>
  <div class="sw"><div class="fill" style="background:#4B5563"></div><div class="meta"><div class="name">borderStrong</div><div class="hex">#4B5563</div><div class="role">Steel Gray</div></div></div>
</div></body></html>
