<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Neutrals (Light)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border:1px solid var(--color-border-subtle);border-radius:3px;overflow:hidden;background:var(--color-surface-elevated)}
  .fill{height:48px;border-bottom:1px solid var(--color-border-subtle)}
  .meta{padding:7px 9px;font-family:var(--font-body);font-size:11px;line-height:1.35}
  .name{font-weight:700;color:var(--color-text-primary);font-size:11px}
  .hex{font-family:var(--font-mono);color:var(--color-text-secondary);font-size:10px;letter-spacing:0.1px}
  .role{color:var(--color-text-secondary);font-size:10px;margin-top:1px}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="fill" style="background:#FAF9F7"></div><div class="meta"><div class="name">background</div><div class="hex">#FAF9F7</div><div class="role">Warm Canvas</div></div></div>
  <div class="sw"><div class="fill" style="background:#F2F0ED"></div><div class="meta"><div class="name">surface</div><div class="hex">#F2F0ED</div><div class="role">Soft Pearl</div></div></div>
  <div class="sw"><div class="fill" style="background:#FFFFFF"></div><div class="meta"><div class="name">surfaceElevated</div><div class="hex">#FFFFFF</div><div class="role">Cloud White</div></div></div>
  <div class="sw"><div class="fill" style="background:#2A2D35"></div><div class="meta"><div class="name">textPrimary</div><div class="hex">#2A2D35</div><div class="role">Ink Navy</div></div></div>
  <div class="sw"><div class="fill" style="background:#6B7280"></div><div class="meta"><div class="name">textSecondary</div><div class="hex">#6B7280</div><div class="role">Slate Gray</div></div></div>
  <div class="sw"><div class="fill" style="background:#9CA3AF"></div><div class="meta"><div class="name">textTertiary</div><div class="hex">#9CA3AF</div><div class="role">Mist Gray</div></div></div>
  <div class="sw"><div class="fill" style="background:#E5E7EB"></div><div class="meta"><div class="name">borderSubtle</div><div class="hex">#E5E7EB</div><div class="role">Whisper</div></div></div>
  <div class="sw"><div class="fill" style="background:#D1D5DB"></div><div class="meta"><div class="name">borderStrong</div><div class="hex">#D1D5DB</div><div class="role">Soft Shadow</div></div></div>
</div></body></html>
