<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Color · Purple</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--color-background); }
  .wrap { padding: 20px; }
  .row { display: flex; gap: 12px; }
  .swatch { flex: 1; min-width: 0; border: 1px solid var(--color-border-subtle); border-radius: 3px; overflow: hidden; background: var(--color-surface-elevated); }
  .fill { height: 64px; }
  .meta { padding: 8px 10px; font-family: var(--font-body); font-size: 11px; line-height: 1.35; }
  .name { font-weight: 700; color: var(--color-text-primary); font-size: 12px; }
  .hex  { font-family: var(--font-mono); color: var(--color-text-secondary); font-size: 11px; letter-spacing: 0.1px; }
  .role { color: var(--color-text-secondary); margin-top: 2px; }
  .check { background-image: linear-gradient(45deg, var(--color-border-subtle) 25%, transparent 25%), linear-gradient(-45deg, var(--color-border-subtle) 25%, transparent 25%); background-size: 8px 8px; }
</style></head><body>
<div class="wrap"><div class="row">
  <div class="swatch"><div class="fill" style="background:#9B87F5"></div><div class="meta"><div class="name">colors.purple</div><div class="hex">#9B87F5</div><div class="role">Secondary btn · L2/L4+ replies · Creator</div></div></div>
  <div class="swatch"><div class="fill" style="background:#8B75E1"></div><div class="meta"><div class="name">purpleHover</div><div class="hex">#8B75E1</div><div class="role">Pressed / hover</div></div></div>
  <div class="swatch"><div class="fill" style="background:#7B65D1"></div><div class="meta"><div class="name">purpleDark</div><div class="hex">#7B65D1</div><div class="role">Borders, emphasis</div></div></div>
  <div class="swatch"><div class="fill check"><div style="background:rgba(155,135,245,0.08); height:100%"></div></div><div class="meta"><div class="name">purpleTintLight</div><div class="hex">rgba(155,135,245, .08)</div><div class="role">L2 reply background</div></div></div>
  <div class="swatch"><div class="fill check"><div style="background:rgba(155,135,245,0.12); height:100%"></div></div><div class="meta"><div class="name">purpleTint</div><div class="hex">rgba(155,135,245, .12)</div><div class="role">L4+ reply background</div></div></div>
</div></div></body></html>
