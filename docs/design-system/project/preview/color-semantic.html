<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .sw{border:1px solid var(--color-border-subtle);border-radius:3px;overflow:hidden;background:var(--color-surface-elevated)}
  .fill{height:60px}
  .meta{padding:8px 10px;font-family:var(--font-body);font-size:11px;line-height:1.4}
  .name{font-weight:700;color:var(--color-text-primary);font-size:12px}
  .hex{font-family:var(--font-mono);color:var(--color-text-secondary);font-size:11px;letter-spacing:0.1px}
  .role{color:var(--color-text-secondary);margin-top:2px}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="fill" style="background:#48BB78"></div><div class="meta"><div class="name">success</div><div class="hex">#48BB78</div><div class="role">Confirmation states</div></div></div>
  <div class="sw"><div class="fill" style="background:#F59E0B"></div><div class="meta"><div class="name">warning</div><div class="hex">#F59E0B</div><div class="role">Quota over 75%, archive swipe</div></div></div>
  <div class="sw"><div class="fill" style="background:#F56565"></div><div class="meta"><div class="name">error</div><div class="hex">#F56565</div><div class="role">Validation, log out, banners</div></div></div>
</div></body></html>
