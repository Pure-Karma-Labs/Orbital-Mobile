<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Thread Item States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:14px 0}
  .item{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 16px;font-family:var(--font-body)}
  .item.read{border-left:3px solid #E5E7EB;background:#FAF9F7}
  .item.active{border-left:3px solid #5B9FED;background:rgba(91,159,237,0.08)}
  .item.unread{border-left:3px solid #9B87F5;background:rgba(155,135,245,0.08)}
  .title{font-size:13px;font-weight:700;color:#2A2D35}
  .meta{font-size:11px;color:#6B7280;margin-top:4px;font-family:var(--font-body)}
  .badge{display:inline-flex;min-width:18px;padding:2px 6px;background:#FFC700;color:#2A2D35;border:1px solid #EAAD00;border-radius:9999px;font-size:10px;font-weight:700;line-height:1;align-self:center}
  .lblrow{font-family:var(--font-mono);font-size:10px;color:#9CA3AF;padding:0 16px}
</style></head><body>
<div class="wrap">
  <div class="lblrow">Read</div>
  <div class="item read"><div><div class="title">Thread title — read</div><div class="meta">Alex · 2:45 PM · 3 💬</div></div></div>
  <div class="lblrow" style="margin-top:8px">Active (currently selected)</div>
  <div class="item active"><div><div class="title">Thread title — active</div><div class="meta">Sarah · 1:20 PM · 7 💬 📷</div></div></div>
  <div class="lblrow" style="margin-top:8px">Unread (purple stripe + unread badge)</div>
  <div class="item unread"><div><div class="title">Thread title — unread</div><div class="meta">Mom · 11:00 AM · 12 💬</div></div><span class="badge">3</span></div>
</div></body></html>
