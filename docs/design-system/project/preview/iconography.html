<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:18px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:1px solid var(--color-border-subtle);border-radius:3px;background:var(--color-surface-elevated)}
  .em{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
  .em img{width:28px;height:28px;display:block}
  .lbl{font-family:var(--font-mono);font-size:9px;color:#6B7280;text-align:center;line-height:1.2}
  .uni{font-family:var(--font-body);font-size:18px;color:#2A2D35;line-height:1}
  .head{font-family:var(--font-mono);font-size:10px;color:#9CA3AF;margin:14px 4px 6px;letter-spacing:.5px;text-transform:uppercase}
</style></head><body>
<div class="wrap">
  <div class="head">OpenMoji · loaded from CDN by codepoint</div>
  <div class="grid">
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F4AC.svg" alt="" loading="lazy"></div><div class="lbl">💬 threads</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F4E8.svg" alt="" loading="lazy"></div><div class="lbl">📨 chats</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/2699.svg" alt="" loading="lazy"></div><div class="lbl">⚙ settings</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F50D.svg" alt="" loading="lazy"></div><div class="lbl">🔍 search</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F4F7.svg" alt="" loading="lazy"></div><div class="lbl">📷 camera</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F5BC.svg" alt="" loading="lazy"></div><div class="lbl">🖼 library</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F4CE.svg" alt="" loading="lazy"></div><div class="lbl">📎 attach</div></div>
    <div class="cell"><div class="em"><img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1FA90.svg" alt="" loading="lazy"></div><div class="lbl">🪐 orbit</div></div>
  </div>
  <div class="head">Unicode chrome · plain text in textPrimary / blue</div>
  <div class="grid">
    <div class="cell"><div class="uni">‹</div><div class="lbl">back</div></div>
    <div class="cell"><div class="uni">▾</div><div class="lbl">dropdown</div></div>
    <div class="cell"><div class="uni">▸</div><div class="lbl">chevron</div></div>
    <div class="cell"><div class="uni">↳</div><div class="lbl">reply-to</div></div>
    <div class="cell"><div class="uni">✓</div><div class="lbl">active</div></div>
    <div class="cell"><div class="uni">✕</div><div class="lbl">close</div></div>
    <div class="cell"><div class="uni" style="color:#5B9FED">✦</div><div class="lbl">sparkle</div></div>
    <div class="cell"><div class="uni">●</div><div class="lbl">status</div></div>
  </div>
</div></body></html>
