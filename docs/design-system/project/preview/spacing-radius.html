<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Border Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:22px;display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:70px;height:70px;background:var(--color-surface-elevated);border:1px solid var(--color-border-strong)}
  .box.blue{background:var(--color-blue);border-color:var(--color-blue-dark)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);text-align:center}
  .name{font-family:var(--font-body);font-size:11px;color:var(--color-text-primary);font-weight:700;text-align:center}
</style></head><body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="name">sm</div><div class="lbl">2px</div></div>
  <div class="item"><div class="box blue" style="border-radius:3px"></div><div class="name">base</div><div class="lbl">3px · default</div></div>
  <div class="item"><div class="box" style="border-radius:3px"></div><div class="name">md</div><div class="lbl">3px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">lg</div><div class="lbl">4px · modals</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;width:70px;height:70px"></div><div class="name">full</div><div class="lbl">9999 · pills · avatars</div></div>
</div></body></html>
