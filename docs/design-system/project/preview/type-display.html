<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Orbital · Type · Display & Headers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background)}
  .wrap{padding:18px 22px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--color-border-subtle);padding-bottom:7px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);letter-spacing:.1px;min-width:128px}
  .smp{color:var(--color-text-primary)}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="tag">2xl · 32/1.2 · Bold</span><span class="smp" style="font-family:var(--font-header);font-size:32px;font-weight:700;line-height:1.2">Welcome to Orbital</span></div>
  <div class="row"><span class="tag">xl · 20/1.3 · Bold</span><span class="smp" style="font-family:var(--font-header);font-size:20px;font-weight:700;line-height:1.3">Your Orbits</span></div>
  <div class="row"><span class="tag">lg · 16/1.4 · Bold</span><span class="smp" style="font-family:var(--font-header);font-size:16px;font-weight:700;line-height:1.4">Family Orbit</span></div>
  <div class="row"><span class="tag">Family</span><span class="smp" style="font-family:var(--font-header);font-size:14px">Trebuchet MS — headers</span></div>
</div></body></html>
