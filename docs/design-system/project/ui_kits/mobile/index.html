<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Orbital Mobile · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* ============= Page chrome (preview surround, NOT part of the design) ============= */
  html, body { margin: 0; padding: 0; background: #2A2D35; min-height: 100vh; }
  body { display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px 64px; }
  .stage { display: flex; gap: 24px; align-items: flex-start; }
  .stage-side { color: #C7CCD4; font-family: var(--font-body); font-size: 12px; max-width: 220px; line-height: 1.6; }
  .stage-side h3 { font-family: var(--font-header); font-size: 14px; color: #fff; margin: 0 0 8px; }
  .nav-btns { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .nav-btns button { background: #3A3F4A; color: #F3F4F6; border: 1px solid #4B5563; border-radius: 3px; padding: 8px 10px; font-family: var(--font-body); font-size: 12px; cursor: pointer; text-align: left; }
  .nav-btns button.is-on { background: #5B9FED; border-color: #3D7BC4; color: #fff; }

  /* ============= iPhone 14 frame ============= */
  .phone { width: 390px; height: 844px; }
  .phone-bezel {
    position: relative; width: 100%; height: 100%; background: #000;
    border-radius: 48px; padding: 8px; box-sizing: border-box;
    box-shadow: 0 0 0 2px #1A1D24, 0 0 0 4px #3A3F4A;
  }
  .phone-screen {
    position: relative; width: 100%; height: 100%; background: var(--color-background);
    border-radius: 40px; overflow: hidden; display: flex; flex-direction: column;
  }
  .phone-island {
    position: absolute; top: 19px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 35px; background: #000; border-radius: 9999px; z-index: 50;
  }
  .phone-content { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* ============= Status bar ============= */
  .status-bar {
    height: 47px; padding: 12px 32px 0; display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-header); font-weight: 700; font-size: 15px; color: var(--color-text-primary);
    flex-shrink: 0;
  }
  .sb-time { letter-spacing: -0.3px; }
  .sb-right { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--color-text-primary); }

  /* ============= Header ============= */
  .hdr {
    height: 44px; display: flex; align-items: center; padding: 0 8px;
    background: var(--color-surface); flex-shrink: 0;
  }
  .hdr-bordered { border-bottom: 1px solid var(--color-border-subtle); }
  .hdr-side { width: 80px; display: flex; align-items: center; }
  .hdr-right { justify-content: flex-end; }
  .hdr-title {
    flex: 1; text-align: center; font-family: var(--font-body); font-weight: 700; font-size: 16px;
    color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hdr-action {
    background: none; border: none; color: var(--color-blue);
    font-family: var(--font-body); font-size: 13px; font-weight: 700;
    min-height: 44px; min-width: 44px; padding: 0 12px; cursor: pointer;
  }
  .hdr-action[disabled] { opacity: 0.5; cursor: default; }
  .back-btn {
    background: none; border: none; color: var(--color-blue);
    font-family: var(--font-body); font-size: 13px;
    min-height: 44px; padding: 0 8px; cursor: pointer;
  }

  /* ============= Tab bar ============= */
  .tab-bar {
    background: var(--color-surface); border-top: 1px solid var(--color-border-subtle);
    display: flex; padding: 4px 0 0; flex-shrink: 0;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; padding: 4px 0 0; cursor: pointer;
    color: var(--color-text-tertiary);
    font-family: var(--font-body); font-size: 10px; min-height: 49px;
  }
  .tab-ico { width: 24px; height: 24px; opacity: 0.6; }
  .tab.is-active { color: var(--color-blue); }
  .tab.is-active .tab-ico { opacity: 1; }
  .tab-lbl { font-size: 10px; }
  .home-indicator { display: none; }
  .tab-bar { padding-bottom: 8px; position: relative; }
  .tab-bar::after { content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: #1A1D24; border-radius: 9999px; }

  /* ============= Auth ============= */
  .auth-screen { flex: 1; display: flex; flex-direction: column; padding: 24px 24px 16px; overflow-y: auto; }
  .auth-banner { text-align: center; margin: 16px 0 28px; }
  .auth-logo { width: 96px; height: 96px; display: block; margin: 0 auto 12px; }
  .ascii-banner { font-family: var(--font-mono); font-size: 11px; color: var(--color-blue); white-space: pre; line-height: 1.3; }
  .auth-title { font-family: var(--font-header); font-weight: 700; font-size: 32px; color: var(--color-blue); margin-top: 14px; }
  .auth-sub { font-family: var(--font-body); font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; }
  .auth-form { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .o-input {
    width: 100%; box-sizing: border-box; padding: 12px;
    background: var(--color-surface-elevated); border: 1px solid var(--color-border-subtle);
    border-radius: 3px; font-family: var(--font-body); font-size: 13px; color: var(--color-text-primary);
    transition: border-color 150ms ease;
  }
  .o-input::placeholder { color: var(--color-text-tertiary); }
  .o-input:focus { outline: none; border: 2px solid var(--color-blue); padding: 11px; }
  .auth-submit { margin-top: 12px; width: 100%; }
  .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 8px 16px; border-radius: 3px; border: 1px solid transparent; font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: var(--color-blue); color: #fff; border-color: var(--color-blue-dark); }
  .btn-secondary { background: var(--color-purple); color: #fff; border-color: var(--color-purple-dark); }
  .btn-outline { background: transparent; color: var(--color-blue); border-color: var(--color-blue); }
  .auth-switch { margin-top: 20px; font-family: var(--font-body); font-size: 13px; color: var(--color-text-secondary); text-align: center; }
  .auth-switch a { color: var(--color-blue); text-decoration: underline; cursor: pointer; }

  /* ============= Inbox ============= */
  .inbox { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .orbit-bar {
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; background: var(--color-surface); border-bottom: 1px solid var(--color-border-subtle);
    cursor: pointer;
  }
  .orbit-name { font-family: var(--font-body); font-weight: 700; font-size: 16px; color: var(--color-text-primary); }
  .search-bar {
    margin: 8px 16px; padding: 8px 12px; height: 36px; box-sizing: border-box;
    background: var(--color-surface-elevated); border: 1px solid var(--color-border-subtle); border-radius: 3px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-body); font-size: 13px; color: var(--color-text-tertiary);
  }
  .inbox-scroll { flex: 1; overflow-y: auto; }
  .ascii-day {
    text-align: center; font-family: var(--font-mono); font-size: 11px;
    color: var(--color-text-tertiary); padding: 12px 0;
  }
  .ascii-section {
    text-align: center; font-family: var(--font-mono); font-size: 11px;
    color: var(--color-text-tertiary); padding: 8px 0; letter-spacing: 2px;
  }
  .thread-item {
    width: 100%; display: flex; align-items: flex-start; justify-content: space-between;
    padding: 12px 16px; gap: 12px; min-height: 64px; box-sizing: border-box;
    background: var(--color-background); border: none; border-left: 3px solid var(--color-border-subtle);
    text-align: left; cursor: pointer; font-family: var(--font-body);
  }
  .thread-item.is-read   { background: var(--color-background); border-left-color: var(--color-border-subtle); }
  .thread-item.is-active { background: var(--color-blue-tint-light); border-left-color: var(--color-blue); }
  .thread-item.is-unread { background: var(--color-purple-tint-light); border-left-color: var(--color-purple); }
  .ti-main { flex: 1; min-width: 0; }
  .ti-title { font-size: 13px; font-weight: 700; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ti-meta { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }
  .o-badge {
    display: inline-flex; min-width: 18px; padding: 2px 6px; align-items: center; justify-content: center;
    background: var(--color-yellow); color: var(--color-text-primary);
    border: 1px solid var(--color-yellow-dark); border-radius: 9999px;
    font-family: var(--font-body); font-size: 10px; font-weight: 700; line-height: 1;
    align-self: center;
  }

  /* ============= Thread Detail ============= */
  .thread-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .thread-title { font-weight: 700; font-size: 16px; }
  .thread-scroll { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 12px; border-radius: 3px; font-family: var(--font-body); font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
  .msg-l0 { background: var(--color-surface-elevated); border: 1px solid var(--color-border-strong); }
  .msg-l1 { background: var(--color-blue-tint-light);   border-left: 3px solid var(--color-blue); }
  .msg-l2 { background: var(--color-purple-tint-light); border-left: 3px solid var(--color-purple); }
  .msg-l3 { background: var(--color-blue-tint);         border-left: 3px solid var(--color-blue); }
  .msg-l4 { background: var(--color-purple-tint);       border-left: 3px solid var(--color-purple); }
  .msg-ctx { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .msg-head { display: flex; align-items: baseline; gap: 8px; }
  .msg-author { font-weight: 700; font-size: 13px; }
  .msg-ts { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); letter-spacing: 0.1px; }
  .msg-body { margin-top: 4px; }
  .msg-photos { display: grid; gap: 4px; margin-top: 8px; }
  .msg-photos.g-1 { grid-template-columns: 1fr; }
  .msg-photos.g-2 { grid-template-columns: 1fr 1fr; }
  .msg-photos.g-3 { grid-template-columns: 2fr 1fr; }
  .msg-photos.g-4 { grid-template-columns: 1fr 1fr; }
  .photo-tile { position: relative; height: 100px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .photo-ico { font-size: 22px; opacity: 0.7; }

  /* ============= Reply composer (fixed at bottom of thread screen) ============= */
  .rcomp { background: var(--color-surface); border-top: 1px solid var(--color-border-subtle); padding: 8px; flex-shrink: 0; }
  .rcomp-ctx { background: var(--color-blue-tint-light); padding: 6px 10px; border-radius: 3px; font-family: var(--font-body); font-size: 11px; color: var(--color-text-secondary); display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .rcomp-x { color: var(--color-text-tertiary); cursor: pointer; }
  .rcomp-row { display: flex; align-items: center; gap: 6px; }
  .rcomp-attach, .rcomp-send {
    background: none; border: none; min-width: 44px; min-height: 44px;
    color: var(--color-text-secondary); font-family: var(--font-body); font-size: 13px;
    cursor: pointer;
  }
  .rcomp-send { color: var(--color-blue); font-weight: 700; }
  .rcomp-send[disabled] { opacity: 0.5; cursor: default; }
  .rcomp-input {
    flex: 1; padding: 8px 12px; background: var(--color-surface-elevated);
    border: 1px solid var(--color-border-subtle); border-radius: 3px;
    font-family: var(--font-body); font-size: 13px; min-height: 36px; box-sizing: border-box;
  }
  .rcomp-input:focus { outline: none; border: 2px solid var(--color-blue); padding: 7px 11px; }

  /* ============= Composer modal ============= */
  .modal-root { position: absolute; inset: 0; background: var(--color-background); display: flex; flex-direction: column; z-index: 30; animation: slideUp 250ms ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .thread-title-input { font-size: 14px; font-weight: 700; }
  .thread-body-input { font-size: 13px; min-height: 120px; resize: vertical; font-family: var(--font-body); }
  .composer-thumbs { display: flex; gap: 8px; }
  .thumb { position: relative; width: 64px; height: 64px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .thumb-x { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: var(--color-text-primary); color: #fff; border-radius: 9999px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
  .quota-warn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--color-yellow-tint); border-radius: 3px; font-family: var(--font-body); font-size: 11px; color: var(--color-yellow-dark); }
  .quota-warn img { width: 16px; height: 16px; }
  .att-bar { height: 44px; display: flex; align-items: center; padding: 0 8px; border-top: 1px solid var(--color-border-subtle); background: var(--color-surface); flex-shrink: 0; }
  .att-bar button { background: none; border: none; min-width: 44px; min-height: 44px; font-size: 18px; cursor: pointer; }

  /* ============= Settings ============= */
  .settings-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .settings-scroll { flex: 1; overflow-y: auto; padding: 16px 0 16px; }
  .profile-card {
    margin: 0 16px 8px; padding: 16px; display: flex; align-items: center; gap: 12px;
    background: var(--color-surface-elevated); border: 1px solid var(--color-border-subtle); border-radius: 3px;
  }
  .avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; color: #fff; font-family: var(--font-header); font-weight: 700; position: relative; }
  .avatar-pres { position: absolute; right: -1px; bottom: -1px; width: 10px; height: 10px; border: 1px solid var(--color-surface-elevated); border-radius: 9999px; }
  .avatar-pres.is-on { background: var(--color-yellow); }
  .avatar-pres.is-off { background: var(--color-text-tertiary); }
  .profile-info { flex: 1; }
  .profile-name { font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--color-text-primary); }
  .profile-handle { font-family: var(--font-body); font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .profile-edit { font-family: var(--font-body); font-size: 13px; color: var(--color-blue); }
  .set-section { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); text-align: center; padding: 16px 16px 8px; }
  .setrow {
    width: 100%; display: flex; align-items: center; gap: 12px; min-height: 52px;
    padding: 0 16px; background: var(--color-background); border: none; border-bottom: 1px solid var(--color-border-subtle);
    font-family: var(--font-body); font-size: 13px; color: var(--color-text-primary); cursor: pointer; text-align: left;
  }
  .setrow.is-destructive { color: var(--color-error); }
  .setrow-ico { font-size: 14px; }
  .setrow-lbl { flex: 1; }
  .setrow-val { color: var(--color-text-secondary); }
  .setrow-chev { color: var(--color-text-tertiary); }
  .quota { padding: 8px 16px; }
  .quota-track { width: 100%; height: 6px; background: var(--color-border-subtle); border-radius: 9999px; overflow: hidden; }
  .quota-fill { height: 100%; border-radius: 9999px; }
  .quota-lbl { font-family: var(--font-body); font-size: 11px; color: var(--color-text-secondary); margin-top: 6px; }

  /* ============= Bottom sheet ============= */
  .bsheet-root { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 150ms ease; }
  .bsheet-root.is-open { opacity: 1; pointer-events: auto; }
  .bsheet { width: 100%; max-height: 60%; background: var(--color-surface); border-top-left-radius: 4px; border-top-right-radius: 4px; padding: 8px 0 16px; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 250ms ease; }
  .bsheet-root.is-open .bsheet { transform: translateY(0); }
  .bsheet-handle { width: 36px; height: 4px; background: var(--color-border-strong); border-radius: 9999px; align-self: center; margin: 4px 0 8px; }
  .bsheet-section { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); text-align: center; padding: 8px 0; }
  .bsheet-sep { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); text-align: center; padding: 8px 0; letter-spacing: 2px; }
  .bsheet-actions { padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }
  .orbit-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 0 16px; min-height: 52px; background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--color-text-primary); text-align: left; }
  .orbit-ico { font-size: 18px; }
  .orbit-iname { font-weight: 700; flex: 1; }
  .orbit-mc { font-size: 11px; color: var(--color-text-secondary); }
  .orbit-check { color: var(--color-blue); font-weight: 700; margin-left: 8px; }

  /* ============= Toast ============= */
  .toast { position: absolute; left: 16px; right: 16px; bottom: 80px; padding: 10px 14px; background: var(--color-text-primary); color: #fff; border-radius: 3px; font-family: var(--font-body); font-size: 13px; display: flex; align-items: center; gap: 8px; z-index: 60; opacity: 0; transition: opacity 200ms ease; pointer-events: none; }
  .toast.is-on { opacity: 1; }
</style>
</head>
<body>

<div class="stage">
  <div class="stage-side" id="left-side">
    <h3>Orbital Mobile</h3>
    <div>Click-through prototype framed at iPhone 14 (390 × 844pt). Tap items, headers and the orbit name to navigate.</div>
    <div class="nav-btns" id="nav-btns"></div>
    <div style="margin-top:18px;font-size:11px;color:#9CA3AF">Tokens: <code style="color:#C7CCD4">/colors_and_type.css</code></div>
  </div>

  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="inbox.jsx"></script>
<script type="text/babel" src="thread.jsx"></script>
<script type="text/babel" src="composer.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="orbits.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const App = () => {
  const [authed, setAuthed] = useState(true);
  const [tab, setTab] = useState('threads');
  const [route, setRoute] = useState('inbox');     // inbox | thread
  const [threadKey, setThreadKey] = useState(null);
  const [composerOpen, setComposerOpen] = useState(false);
  const [orbitsOpen, setOrbitsOpen] = useState(false);
  const [orbit, setOrbit] = useState('Family Orbit');
  const [toast, setToast] = useState(null);

  // Demo nav buttons
  const stops = [
    { id: 'auth',     label: '1. Auth' },
    { id: 'inbox',    label: '2. Inbox' },
    { id: 'thread',   label: '3. Thread Detail' },
    { id: 'compose',  label: '4. Composer' },
    { id: 'orbits',   label: '5. Orbit selector' },
    { id: 'settings', label: '6. Settings' },
  ];
  const goto = (id) => {
    setComposerOpen(false); setOrbitsOpen(false);
    if (id === 'auth')     { setAuthed(false); }
    if (id === 'inbox')    { setAuthed(true); setTab('threads'); setRoute('inbox'); }
    if (id === 'thread')   { setAuthed(true); setTab('threads'); setRoute('thread'); setThreadKey('market'); }
    if (id === 'compose')  { setAuthed(true); setTab('threads'); setRoute('inbox'); setComposerOpen(true); }
    if (id === 'orbits')   { setAuthed(true); setTab('threads'); setRoute('inbox'); setOrbitsOpen(true); }
    if (id === 'settings') { setAuthed(true); setTab('settings'); }
  };

  useEffect(() => {
    const host = document.getElementById('nav-btns');
    if (!host) return;
    host.innerHTML = '';
    stops.forEach(s => {
      const b = document.createElement('button');
      b.textContent = s.label;
      b.onclick = () => goto(s.id);
      host.appendChild(b);
    });
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1800); };

  let body;
  if (!authed) {
    body = <AuthScreen onLogin={() => { setAuthed(true); showToast('Welcome back, Alex!'); }} />;
  } else if (tab === 'settings') {
    body = <SettingsScreen />;
  } else if (route === 'thread') {
    body = <ThreadDetail title="Farmer's market on Saturday?" onBack={() => setRoute('inbox')} />;
  } else {
    body = <InboxScreen
      orbit={orbit}
      onOpenOrbits={() => setOrbitsOpen(true)}
      onOpenThread={(k) => { setThreadKey(k); setRoute('thread'); }}
      onCompose={() => setComposerOpen(true)}
    />;
  }

  return (
    <PhoneFrame>
      {body}
      {tab !== null && <TabBar active={tab} onSelect={setTab} />}
      <ComposerModal open={composerOpen} onClose={() => setComposerOpen(false)} />
      <OrbitSelectorSheet
        open={orbitsOpen}
        onClose={() => setOrbitsOpen(false)}
        current={orbit}
        onSelect={(o) => { setOrbit(o); setOrbitsOpen(false); showToast(`Switched to ${o}`); }}
      />
      <div className={`toast ${toast ? 'is-on' : ''}`}>✓ {toast}</div>
    </PhoneFrame>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
