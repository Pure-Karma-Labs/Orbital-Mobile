[package]
name = "orbital_signal"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[features]
default = []
dev-roundtrip = []

[dependencies]
uniffi = "0.31.0"
thiserror = "2.0"
rand = "0.9"
uuid = { version = "1.5", features = ["v4"] }

# libsignal-protocol from Signal's repo (keep both tags + boring patch in lockstep)
libsignal-protocol = { git = "https://github.com/signalapp/libsignal", tag = "v0.95.0" }
libsignal-core = { git = "https://github.com/signalapp/libsignal", tag = "v0.95.0" }

# AES-256-GCM for content encryption (threads, replies — per-field with AAD)
aes-gcm = { version = "0.10", features = ["zeroize"] }

# AES-256-CBC + HMAC-SHA256 for attachment encryption (Signal Protocol format)
aes = { version = "0.9", features = ["zeroize"] }
cbc = { version = "0.1", features = ["zeroize"] }
hmac = { version = "0.12", features = ["reset"] }
sha2 = "0.10"

# ECIES: X25519 ECDH, HKDF-SHA256, and EphemeralSecret RNG
x25519-dalek = { version = "2", features = ["static_secrets"] }
hkdf = "0.12"
# rand_core 0.6 — needed for x25519-dalek::EphemeralSecret::random_from_rng
# (x25519-dalek v2 depends on rand_core 0.6, not 0.9)
rand_core = { version = "0.6", features = ["getrandom"] }

# Key zeroization and constant-time comparison
zeroize = "1.8"
subtle = "2.6"

# Needed for async runtime (uniffi async functions use tokio)
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }

# async-trait needed for store trait impls
async-trait = "0.1"

[dev-dependencies]
hex-literal = "0.4"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

[patch.crates-io]
# Use Signal's forks to avoid duplicate dependency issues
boring = { git = "https://github.com/signalapp/boring", tag = "signal-v5.0.2" }
boring-sys = { git = "https://github.com/signalapp/boring", tag = "signal-v5.0.2" }
curve25519-dalek = { git = "https://github.com/signalapp/curve25519-dalek", tag = "signal-curve25519-4.1.3" }
